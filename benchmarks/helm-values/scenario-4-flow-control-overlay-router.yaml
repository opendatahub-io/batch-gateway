# Flow control overlay for llm-d Router (router.epp.* format for v0.9.0+ charts).
# Applied in scenario 4 to enable priority dispatch ordering:
#   Flow control's dispatch cycle dispatches one request per tick, highest
#   priority first. Interactive (priority 100) always dispatches before
#   batch (priority -1). This priority ordering passively protects
#   interactive latency.
#
# Uses concurrency-detector with generous maxConcurrency (1000) so that
# saturation stays well below 1.0 and the dispatch cycle runs freely.
# The protection comes from dispatch ordering, not saturation-based rejection.
#
# Priority bands:
#   Interactive (100): low-latency, round-robin fairness, FCFS ordering
#   Batch (-1): sheddable, throughput-optimized, SLO-deadline ordering
router:
  epp:
    pluginsConfigFile: "flow-control-plugins.yaml"
    pluginsCustomConfig:
      flow-control-plugins.yaml: |
        apiVersion: inference.networking.x-k8s.io/v1alpha1
        kind: EndpointPickerConfig
        featureGates:
          - "flowControl"
        plugins:
          - type: round-robin-fairness-policy
          - type: global-strict-fairness-policy
          - type: slo-deadline-ordering-policy
          - type: concurrency-detector
            parameters:
              maxConcurrency: 1000
              concurrencyMultiplier: 1
        flowControl:
          maxBytes: 4294967296
          defaultRequestTTL: 30s
          priorityBands:
            - priority: 100
              maxBytes: 1073741824
              fairnessPolicyRef: round-robin-fairness-policy
              orderingPolicyRef: fcfs-ordering-policy
            - priority: -1
              maxBytes: 3221225472
              fairnessPolicyRef: global-strict-fairness-policy
              orderingPolicyRef: slo-deadline-ordering-policy
          defaultPriorityBand:
            maxBytes: 536870912
            fairnessPolicyRef: global-strict-fairness-policy
            orderingPolicyRef: fcfs-ordering-policy
          saturationDetector:
            pluginRef: concurrency-detector
