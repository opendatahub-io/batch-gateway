# Scenario 3: AIMD only (processor-side adaptive concurrency)
# Sync dispatch with AIMD enabled. llm-d Router flow control disabled.
# AIMD protects the inference backend from overload by reducing per-endpoint
# concurrency on 429/5xx and gradually increasing on success.
processor:
  config:
    dispatchMode: sync
    concurrency:
      global: 100
      perEndpoint: 20
      recovery: 5
      aimd:
        enabled: true
        min: 5
        backoffFactor: 0.5
        additiveIncrease: 1
    modelGateways:
      Qwen/Qwen3-0.6B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "2s"
        maxBackoff: "30s"
      Qwen/Qwen3-8B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "2s"
        maxBackoff: "30s"
      Qwen/Qwen3-32B-AWQ:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "2s"
        maxBackoff: "30s"
