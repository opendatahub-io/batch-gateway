# Typos configuration
# https://github.com/crate-ci/typos

[default.extend-words]
# Azure Kubernetes Service abbreviation
AKS = "AKS"
aks = "aks"
# Indian Standard Time / Istio abbreviation
IST = "IST"
# Abbreviation (e.g., 2nd -> ND)
ND = "ND"
# HashiCorp prefix
Hashi = "Hashi"
# Security scanner tool
gosec = "gosec"
# Go import formatting tool
goimports = "goimports"
# Go linter
golangci = "golangci"

# Additive Increase Multiplicative Decrease (congestion control algorithm)
AIMD = "AIMD"
aimd = "aimd"
