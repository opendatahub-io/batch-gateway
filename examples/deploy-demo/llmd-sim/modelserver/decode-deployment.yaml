apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmd-sim-decode
  labels:
    llm-d.ai/role: decode
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "simulated-accelerators"
    llm-d.ai/accelerator-variant: "cpu"
    llm-d.ai/model: "random"
spec:
  replicas: 3
  selector:
    matchLabels:
      llm-d.ai/role: decode
      llm-d.ai/inference-serving: "true"
      llm-d.ai/guide: "simulated-accelerators"
      llm-d.ai/accelerator-variant: "cpu"
      llm-d.ai/model: "random"
  template:
    metadata:
      labels:
        llm-d.ai/role: decode
        llm-d.ai/inference-serving: "true"
        llm-d.ai/guide: "simulated-accelerators"
        llm-d.ai/accelerator-variant: "cpu"
        llm-d.ai/model: "random"
    spec:
      serviceAccountName: llmd-sim-sa
      containers:
        - name: modelserver
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.9.2
          args:
            - "--model"
            - "random"
            - "--served-model-name"
            - "random"
          ports:
            - name: modelserver
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
