{{- if .Values.processor.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "batch-gateway.processor.fullname" . }}-config
  labels:
    {{- include "batch-gateway.processor.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Processor configuration

    addr: {{ .Values.processor.config.addr | quote }}
    task_wait_time: {{ .Values.processor.config.taskWaitTime | quote }}
    poll_interval: {{ .Values.processor.config.pollInterval | quote }}
    num_workers: {{ .Values.processor.config.numWorkers }}
    max_job_concurrency: {{ .Values.processor.config.maxJobConcurrency }}

    terminate_on_observability_failure: {{ .Values.processor.config.terminateOnObservabilityFailure }}
    shutdown_timeout: {{ .Values.processor.config.shutdownTimeout | quote }}
    work_dir: {{ .Values.processor.config.workDir | quote }}
    max_open_files: {{ .Values.processor.config.maxOpenFiles }}

    database_type: {{ .Values.global.databaseType | quote }}

    inference_config:
      gateway_url: {{ .Values.processor.config.inferenceConfig.gatewayUrl | quote }}
      request_timeout: {{ .Values.processor.config.inferenceConfig.requestTimeout | quote }}
      max_retries: {{ .Values.processor.config.inferenceConfig.maxRetries }}
      initial_backoff: {{ .Values.processor.config.inferenceConfig.initialBackoff | quote }}
      max_backoff: {{ .Values.processor.config.inferenceConfig.maxBackoff | quote }}
      tls_insecure_skip_verify: {{ .Values.processor.config.inferenceConfig.tlsInsecureSkipVerify }}
      tls_ca_cert_file: {{ .Values.processor.config.inferenceConfig.tlsCaCertFile | default "" | quote }}
      tls_client_cert_file: {{ .Values.processor.config.inferenceConfig.tlsClientCertFile | default "" | quote }}
      tls_client_key_file: {{ .Values.processor.config.inferenceConfig.tlsClientKeyFile | default "" | quote }}

    upload_retry:
      max_retries: {{ .Values.processor.config.uploadRetry.maxRetries }}
      initial_backoff: {{ .Values.processor.config.uploadRetry.initialBackoff | quote }}
      max_backoff: {{ .Values.processor.config.uploadRetry.maxBackoff | quote }}

    default_output_expiration_seconds: {{ .Values.processor.config.defaultOutputExpirationSeconds }}
    progress_ttl_seconds: {{ .Values.processor.config.progressTTLSeconds }}

    file_client:
      type: {{ .Values.global.fileClient.type | quote }}
      fs:
        base_path: {{ .Values.global.fileClient.fs.basePath | quote }}
      s3:
        region: {{ .Values.global.fileClient.s3.region | quote }}
        endpoint: {{ .Values.global.fileClient.s3.endpoint | quote }}
        access_key_id: {{ .Values.global.fileClient.s3.accessKeyID | quote }}
        prefix: {{ .Values.global.fileClient.s3.prefix | quote }}
        use_path_style: {{ .Values.global.fileClient.s3.usePathStyle }}

    queue_time_bucket:
      bucket_start: {{ .Values.processor.config.queueTimeBucket.bucketStart }}
      bucket_factor: {{ .Values.processor.config.queueTimeBucket.bucketFactor }}
      bucket_count: {{ .Values.processor.config.queueTimeBucket.bucketCount }}

    process_time_bucket:
      bucket_start: {{ .Values.processor.config.processTimeBucket.bucketStart }}
      bucket_factor: {{ .Values.processor.config.processTimeBucket.bucketFactor }}
      bucket_count: {{ .Values.processor.config.processTimeBucket.bucketCount }}

    otel:
      redis_tracing: {{ .Values.global.otel.redisTracing }}
    {{- if .Values.processor.tls.enabled }}
    ssl_cert_file: "/etc/tls/tls.crt"
    ssl_key_file: "/etc/tls/tls.key"
    {{- end }}
{{- end }}
