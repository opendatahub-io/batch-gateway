name: Add default labels to PRs

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  add-label:
    # This workflow only runs in the upstream project (llm-d-incubation/batch-gateway).
    # Pull requests from forks are skipped because GitHub gives this workflow a read-only GITHUB_TOKEN, so
    # it cannot add labels (writes are blocked).
    if: github.repository == 'llm-d-incubation/batch-gateway' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Add default labels
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ai-assisted']
            });
